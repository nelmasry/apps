<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Larsberg → Ropsten</title>

  <style>
    :root {
      --bg: #080b12;
      --panel: #111827;
      --panel-2: #172033;
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #22c55e;
      --yellow: #facc15;
      --red: #fb7185;
      --blue: #38bdf8;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.14), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .board {
      width: min(590px, 100%);
      max-height: calc(100vh - 48px);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 22px;
      flex-shrink: 0;
    }

    .route-label {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .title {
      margin-top: 4px;
      font-size: clamp(28px, 6vw, 42px);
      line-height: 1.05;
      font-weight: 850;
    }

    .status {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      min-width: 110px;
    }

    .live-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      box-shadow: 0 0 14px var(--green);
    }

    .next-card {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.18), rgba(56, 189, 248, 0.12));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .next-label {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .next-main {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }

    .next-time {
      font-size: clamp(54px, 14vw, 96px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.06em;
    }

    .next-clock {
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
      margin-top: 8px;
    }

    .next-line {
      text-align: right;
      font-size: 20px;
      color: var(--text);
      font-weight: 750;
    }

    .next-mode {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .content-scroll {
      overflow-y: auto;
      padding-right: 4px;
    }

    .content-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .content-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.28);
      border-radius: 999px;
    }

    .rows {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 12px;
      align-items: center;
      background: rgba(23, 32, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .row-button {
      width: 100%;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .row-button:hover {
      background: rgba(31, 43, 68, 0.96);
      border-color: rgba(56, 189, 248, 0.32);
      transform: translateY(-1px);
    }

    .row-button:focus-visible {
      outline: 3px solid rgba(56, 189, 248, 0.55);
      outline-offset: 2px;
    }

    .line {
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(56, 189, 248, 0.16);
      color: var(--blue);
      font-weight: 900;
      font-size: 18px;
    }

    .destination {
      font-size: 20px;
      font-weight: 760;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .time {
      font-size: 24px;
      font-weight: 850;
      white-space: nowrap;
    }

    .time-block {
      text-align: right;
    }

    .exact-time {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-top: 3px;
      white-space: nowrap;
    }

    body.modal-open {
      overflow: hidden;
    }

    .details-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(3, 6, 12, 0.78);
      backdrop-filter: blur(8px);
    }

    .details-modal[hidden] {
      display: none;
    }

    .details-panel {
      width: min(520px, 100%);
      max-height: min(760px, calc(100vh - 48px));
      display: flex;
      flex-direction: column;
      background: #111827;
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.62);
      overflow: hidden;
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--border);
    }

    .details-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
    }

    .details-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .details-close {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font: inherit;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .details-close:hover,
    .details-close:focus-visible {
      background: rgba(255, 255, 255, 0.12);
    }

    .details-body {
      min-height: 150px;
      overflow-y: auto;
      padding: 18px 22px 22px;
    }

    .details-status {
      color: var(--muted);
      padding: 28px 8px;
      text-align: center;
    }

    .details-list {
      display: grid;
      gap: 10px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      background: rgba(23, 32, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .detail-route {
      font-size: 17px;
      font-weight: 760;
    }

    .detail-meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .warning {
      display: none;
      margin-top: 16px;
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(250, 204, 21, 0.13);
      border: 1px solid rgba(250, 204, 21, 0.25);
      color: #fde68a;
      font-size: 14px;
      line-height: 1.4;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      flex-shrink: 0;
    }

    .error {
      display: none;
      background: rgba(251, 113, 133, 0.12);
      border: 1px solid rgba(251, 113, 133, 0.28);
      color: #fecdd3;
      padding: 14px 16px;
      border-radius: 18px;
      margin-bottom: 16px;
      line-height: 1.4;
      flex-shrink: 0;
    }

    @media (max-width: 420px) {
      body {
        padding: 12px;
      }

      .board {
        width: 100%;
        max-height: calc(100vh - 24px);
        border-radius: 22px;
        padding: 18px;
      }

      .header {
        flex-direction: column;
        margin-bottom: 16px;
      }

      .status {
        text-align: left;
      }

      .next-card {
        padding: 18px;
      }

      .row {
        grid-template-columns: 48px 1fr auto;
        padding: 12px;
      }

      .destination {
        font-size: 17px;
      }

      .time {
        font-size: 20px;
      }

      .footer {
        flex-direction: column;
        gap: 4px;
      }

      .details-modal {
        padding: 12px;
      }

      .details-panel {
        max-height: calc(100vh - 24px);
        border-radius: 20px;
      }

      .details-header,
      .details-body {
        padding-left: 16px;
        padding-right: 16px;
      }

      .detail-row {
        grid-template-columns: 48px 1fr auto;
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="board">
    <section class="header">
      <div>
        <div class="route-label">Home departure board</div>
        <div class="title">Larsberg → Ropsten</div>
      </div>

      <div class="status">
        <div><span class="live-dot"></span>Live</div>
        <div id="updatedAt">Loading...</div>
      </div>
    </section>

    <div id="error" class="error"></div>

    <section id="nextCard" class="next-card">
      <div class="next-label">Next departure</div>

      <div class="next-main">
        <div>
          <div id="nextTime" class="next-time">--</div>
          <div id="nextClock" class="next-clock">--:--</div>
        </div>

        <div>
          <div id="nextLine" class="next-line">--</div>
          <div id="nextMode" class="next-mode">--</div>
        </div>
      </div>
    </section>

    <section class="content-scroll">
      <section id="rows" class="rows"></section>
      <section id="warning" class="warning"></section>
    </section>

    <footer class="footer">
      <span>Data from SL / Trafiklab</span>
      <span id="refreshCountdown">Refreshes in 60s</span>
    </footer>
  </main>

  <div id="detailsModal" class="details-modal" hidden aria-hidden="true">
    <section class="details-panel" role="dialog" aria-modal="true" aria-labelledby="detailsTitle">
      <header class="details-header">
        <div>
          <h2 id="detailsTitle" class="details-title">Upcoming departures</h2>
          <div id="detailsSubtitle" class="details-subtitle">Next 2 hours</div>
        </div>
        <button id="detailsClose" class="details-close" type="button" aria-label="Close departure list">&times;</button>
      </header>

      <div class="details-body">
        <div id="detailsStatus" class="details-status">Loading departures...</div>
        <div id="detailsList" class="details-list"></div>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://transport.integration.sl.se/v1/sites/9249/departures";
    const JOURNEY_API_URL = "https://journeyplanner.integration.sl.se/v2/trips";

    const CONFIG = {
      destination: "Ropsten",

      // Show all matching departures within the next 1 hour.
      lookAheadMinutes: 60,

      // Load the selected line's direct departures for the next 2 hours.
      detailsLookAheadMinutes: 120,
      detailsQueryOffsetsMinutes: [0, 30, 60, 90],
      originSiteId: "9091001000009249",
      destinationSiteId: "9091001000009220",

      // Show departures this many minutes earlier as a safety buffer.
      safetyBufferMinutes: 1,

      // Use ["TRAM"] for Lidingöbanan only.
      // Use ["TRAM", "BUS"] to show both tram 21 and bus 206.
      transportModes: ["TRAM", "BUS"],

      // Use ["21"] for tram only.
      // Use ["21", "206"] to show both.
      lines: ["21", "206"],

      refreshMs: 60_000
    };

    const $ = (id) => document.getElementById(id);

    function getBufferedDepartureDate(dateString) {
      const departure = new Date(dateString);

      return new Date(
        departure.getTime() - CONFIG.safetyBufferMinutes * 60_000
      );
    }

    function modeIcon(mode) {
      switch (mode) {
        case "TRAM":
          return "🚋";
        case "BUS":
          return "🚌";
        case "METRO":
          return "🚇";
        case "TRAIN":
          return "🚆";
        case "SHIP":
          return "⛴️";
        default:
          return "➡️";
      }
    }

    function formatMode(mode) {
      switch (mode) {
        case "TRAM":
          return "Tram / Lidingöbanan";
        case "BUS":
          return "Bus";
        case "METRO":
          return "Metro";
        case "TRAIN":
          return "Train";
        case "SHIP":
          return "Ferry";
        default:
          return mode || "Transport";
      }
    }

    function minutesUntil(dateString) {
      const expected = getBufferedDepartureDate(dateString);
      const now = new Date();

      return Math.round((expected.getTime() - now.getTime()) / 60_000);
    }

    function formatClockTime(dateString) {
      const date = getBufferedDepartureDate(dateString);

      return date.toLocaleTimeString("en-GB", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function translateDisplay(value) {
      if (!value) return "--";

      if (value.toLowerCase() === "nu") {
        return "Now";
      }

      return value;
    }

    function formatDepartureTime(departure) {
      const mins = minutesUntil(departure.expected);

      if (mins <= 0) {
        return "Now";
      }

      return `${mins} min`;
    }

    function translateAlertMessage(message) {
      if (!message) return "";

      const knownTranslations = [
        {
          sv: "Bussar ersätter spårvagnarna mellan Käppala och Gåshaga brygga på vardagar under rusningstid pga underhållsarbete på spårvagnarna. Läs mer på sl.se.",
          en: "Buses replace trams between Käppala and Gåshaga brygga on weekdays during rush hour due to maintenance work on the trams. Read more at sl.se."
        }
      ];

      const match = knownTranslations.find(item => item.sv === message);

      if (match) {
        return match.en;
      }

      return message;
    }

    function normalizeDeparture(d) {
      return {
        destination: d.destination,
        display: d.display,
        expected: d.expected,
        scheduled: d.scheduled,
        state: d.state,
        journeyId: d.journey?.id,
        line: d.line?.designation,
        mode: d.line?.transport_mode,
        groupOfLines: d.line?.group_of_lines,
        stopArea: d.stop_area?.name,
        stopPoint: d.stop_point?.designation,
        deviations: d.deviations || []
      };
    }

    function matchesConfiguredDestination(destination) {
      if (!destination) {
        return false;
      }

      const normalizedDestination = destination.toLowerCase();
      const configuredDestination = CONFIG.destination.toLowerCase();

      return normalizedDestination === configuredDestination ||
        normalizedDestination.startsWith(`${configuredDestination} via `);
    }

    function filterDepartures(departures) {
      const seenJourneys = new Set();

      return departures
        .map(normalizeDeparture)
        .filter(d => matchesConfiguredDestination(d.destination))
        .filter(d => CONFIG.transportModes.includes(d.mode))
        .filter(d => CONFIG.lines.includes(d.line))
        .filter(d => {
          const mins = minutesUntil(d.expected);
          return mins >= 0 && mins <= CONFIG.lookAheadMinutes;
        })
        .sort((a, b) => new Date(a.expected) - new Date(b.expected))
        .filter(d => {
          if (!d.journeyId) {
            return true;
          }

          const journeyKey = `${d.mode}:${d.line}:${d.journeyId}`;

          if (seenJourneys.has(journeyKey)) {
            return false;
          }

          seenJourneys.add(journeyKey);
          return true;
        });
    }

    function renderDepartures(items) {
      const rows = $("rows");
      rows.innerHTML = "";

      if (items.length === 0) {
        $("nextTime").textContent = "--";
        $("nextClock").textContent = "--:--";
        $("nextLine").textContent = "No departures";
        $("nextMode").textContent = "Try refreshing";

        rows.innerHTML = `
          <div class="row">
            <div class="line">?</div>
            <div>
              <div class="destination">No matching departures</div>
              <div class="meta">Destination: ${CONFIG.destination}</div>
            </div>
            <div class="time">--</div>
          </div>
        `;

        return;
      }

      const next = items[0];

      $("nextTime").textContent = formatDepartureTime(next);
      $("nextClock").textContent = formatClockTime(next.expected);
      $("nextLine").textContent = `${modeIcon(next.mode)} ${next.line} ${next.destination}`;
      $("nextMode").textContent = formatMode(next.mode);

      for (const item of items) {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "row row-button";
        row.setAttribute(
          "aria-label",
          `Show ${item.line} departures to ${item.destination} for the next 2 hours`
        );

        row.innerHTML = `
          <div class="line">${item.line}</div>
          <div>
            <div class="destination">${modeIcon(item.mode)} ${item.destination}</div>
            <div class="meta">
              ${formatMode(item.mode)}
              ${item.stopPoint ? " · Platform " + item.stopPoint : ""}
            </div>
          </div>
          <div class="time-block">
            <div class="time">${formatDepartureTime(item)}</div>
            <div class="exact-time">${formatClockTime(item.expected)}</div>
          </div>
        `;

        row.addEventListener("click", () => openDepartureDetails(item));

        rows.appendChild(row);
      }
    }

    function formatJourneyQueryDate(date) {
      const parts = Object.fromEntries(
        new Intl.DateTimeFormat("en-GB", {
          timeZone: "Europe/Stockholm",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hourCycle: "h23"
        })
          .formatToParts(date)
          .filter(part => part.type !== "literal")
          .map(part => [part.type, part.value])
      );

      return {
        date: `${parts.year}${parts.month}${parts.day}`,
        time: `${parts.hour}${parts.minute}`
      };
    }

    function buildJourneyPlannerUrl(mode, queryDate) {
      const modeParameter = {
        TRAM: "incl_mot_4",
        BUS: "incl_mot_5"
      }[mode];

      if (!modeParameter) {
        throw new Error(`Unsupported transport mode: ${mode}`);
      }

      const { date, time } = formatJourneyQueryDate(queryDate);
      const url = new URL(JOURNEY_API_URL);
      const transportParameters = [
        "incl_mot_0",
        "incl_mot_2",
        "incl_mot_4",
        "incl_mot_5",
        "incl_mot_9",
        "incl_mot_10",
        "incl_mot_14",
        "incl_mot_19"
      ];

      url.searchParams.set("type_origin", "any");
      url.searchParams.set("name_origin", CONFIG.originSiteId);
      url.searchParams.set("type_destination", "any");
      url.searchParams.set("name_destination", CONFIG.destinationSiteId);
      url.searchParams.set("calc_number_of_trips", "3");
      url.searchParams.set("calc_one_direction", "true");
      url.searchParams.set("max_changes", "0");
      url.searchParams.set("no_alt", "true");
      url.searchParams.set("language", "en");
      url.searchParams.set("itd_date", date);
      url.searchParams.set("itd_time", time);
      url.searchParams.set("itd_trip_date_time_dep_arr", "dep");

      for (const parameter of transportParameters) {
        url.searchParams.set(parameter, "false");
      }

      url.searchParams.set(modeParameter, "true");
      return url.toString();
    }

    function normalizeDetailedJourney(journey, selectedDeparture) {
      const matchingLeg = journey.legs?.find(leg => {
        const line = leg.transportation?.disassembledName;
        const destination = leg.transportation?.destination?.name;

        return line === selectedDeparture.line &&
          matchesConfiguredDestination(destination);
      });

      if (!matchingLeg) {
        return null;
      }

      const expected = matchingLeg.origin?.departureTimeEstimated ||
        matchingLeg.origin?.departureTimePlanned ||
        matchingLeg.origin?.departureTimeBaseTimetable;

      if (!expected) {
        return null;
      }

      const transportation = matchingLeg.transportation;

      return {
        destination: CONFIG.destination,
        expected,
        scheduled: matchingLeg.origin?.departureTimePlanned || expected,
        journeyId: transportation?.properties?.RealtimeTripId ||
          transportation?.properties?.AVMSTripID ||
          matchingLeg.properties?.tripId ||
          journey.tripId ||
          `${selectedDeparture.mode}:${selectedDeparture.line}:${expected}`,
        line: selectedDeparture.line,
        mode: selectedDeparture.mode,
        groupOfLines: selectedDeparture.groupOfLines,
        stopPoint: matchingLeg.origin?.properties?.platformName ||
          matchingLeg.origin?.disassembledName,
        deviations: []
      };
    }

    async function loadDetailedDepartures(selectedDeparture) {
      const windowStart = new Date();
      const queries = CONFIG.detailsQueryOffsetsMinutes.map(offsetMinutes => {
        const queryDate = new Date(windowStart.getTime() + offsetMinutes * 60_000);
        const url = buildJourneyPlannerUrl(selectedDeparture.mode, queryDate);

        return fetch(url, {
          headers: {
            "Accept": "application/json"
          }
        }).then(async response => {
          if (!response.ok) {
            throw new Error(`SL Journey Planner failed: ${response.status}`);
          }

          return response.json();
        });
      });

      const responses = await Promise.all(queries);
      const seenJourneys = new Set();

      return responses
        .flatMap(response => response.journeys || [])
        .map(journey => normalizeDetailedJourney(journey, selectedDeparture))
        .filter(Boolean)
        .filter(departure => {
          const mins = minutesUntil(departure.expected);
          return mins >= 0 && mins <= CONFIG.detailsLookAheadMinutes;
        })
        .sort((a, b) => new Date(a.expected) - new Date(b.expected))
        .filter(departure => {
          const journeyKey = `${departure.mode}:${departure.line}:${departure.journeyId}`;

          if (seenJourneys.has(journeyKey)) {
            return false;
          }

          seenJourneys.add(journeyKey);
          return true;
        });
    }

    function renderDetailedDepartures(items) {
      const list = $("detailsList");
      const status = $("detailsStatus");
      list.replaceChildren();

      if (items.length === 0) {
        status.hidden = false;
        status.textContent = "No matching departures found in the next 2 hours.";
        return;
      }

      status.hidden = true;

      for (const item of items) {
        const detailRow = document.createElement("div");
        detailRow.className = "detail-row";

        const line = document.createElement("div");
        line.className = "line";
        line.textContent = item.line;

        const route = document.createElement("div");
        const routeName = document.createElement("div");
        routeName.className = "detail-route";
        routeName.textContent = `${modeIcon(item.mode)} ${item.destination}`;

        const meta = document.createElement("div");
        meta.className = "detail-meta";
        meta.textContent = formatMode(item.mode) +
          (item.stopPoint ? ` · Platform ${item.stopPoint}` : "");
        route.append(routeName, meta);

        const time = document.createElement("div");
        time.className = "time-block";
        const relativeTime = document.createElement("div");
        relativeTime.className = "time";
        relativeTime.textContent = formatDepartureTime(item);
        const exactTime = document.createElement("div");
        exactTime.className = "exact-time";
        exactTime.textContent = formatClockTime(item.expected);
        time.append(relativeTime, exactTime);

        detailRow.append(line, route, time);
        list.appendChild(detailRow);
      }
    }

    let detailRequestId = 0;
    let detailTrigger = null;

    async function openDepartureDetails(selectedDeparture) {
      const requestId = ++detailRequestId;
      detailTrigger = document.activeElement;

      $("detailsTitle").textContent =
        `${modeIcon(selectedDeparture.mode)} ${selectedDeparture.line} to ${CONFIG.destination}`;
      $("detailsSubtitle").textContent =
        "Next 2 hours · includes the 1-minute safety buffer";
      $("detailsStatus").hidden = false;
      $("detailsStatus").textContent = "Loading departures...";
      $("detailsList").replaceChildren();
      $("detailsModal").hidden = false;
      $("detailsModal").setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
      $("detailsClose").focus();

      try {
        const items = await loadDetailedDepartures(selectedDeparture);

        if (requestId === detailRequestId) {
          renderDetailedDepartures(items);
        }
      } catch (error) {
        console.error(error);

        if (requestId === detailRequestId) {
          $("detailsStatus").hidden = false;
          $("detailsStatus").textContent =
            "Could not load the 2-hour departure list. Please try again.";
        }
      }
    }

    function closeDepartureDetails() {
      detailRequestId += 1;
      $("detailsModal").hidden = true;
      $("detailsModal").setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-open");

      if (detailTrigger instanceof HTMLElement) {
        detailTrigger.focus();
      }
    }

    function renderWarning(stopDeviations) {
      const warning = $("warning");

      if (!Array.isArray(stopDeviations) || stopDeviations.length === 0) {
        warning.style.display = "none";
        warning.textContent = "";
        return;
      }

      const firstMessage = stopDeviations[0]?.message;

      if (!firstMessage) {
        warning.style.display = "none";
        warning.textContent = "";
        return;
      }

      warning.style.display = "block";
      warning.textContent = "⚠️ " + translateAlertMessage(firstMessage);
    }

    function setUpdatedNow() {
      const now = new Date();

      $("updatedAt").textContent = now.toLocaleTimeString("en-GB", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showError(message) {
      const error = $("error");
      error.style.display = "block";
      error.textContent = message;
    }

    function clearError() {
      const error = $("error");
      error.style.display = "none";
      error.textContent = "";
    }

    let nextRefreshAt = Date.now() + CONFIG.refreshMs;

    function updateRefreshCountdown() {
      const millisecondsLeft = Math.max(0, nextRefreshAt - Date.now());
      const secondsLeft = Math.ceil(millisecondsLeft / 1_000);

      $("refreshCountdown").textContent = `Refreshes in ${secondsLeft}s`;
    }

    async function loadDepartures() {
      try {
        clearError();

        const response = await fetch(API_URL, {
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error(`SL API failed: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();

        const filtered = filterDepartures(data.departures || []);

        renderDepartures(filtered);
        renderWarning(data.stop_deviations || []);
        setUpdatedNow();
      } catch (error) {
        console.error(error);

        showError(
          "Could not load departures. If this works in Postman but not in the browser, it may be a CORS issue. Then we need a tiny backend/proxy."
        );
      }
    }

    function startRefreshCycle() {
      nextRefreshAt = Date.now() + CONFIG.refreshMs;
      updateRefreshCountdown();
      loadDepartures();
    }

    $("detailsClose").addEventListener("click", closeDepartureDetails);
    $("detailsModal").addEventListener("click", event => {
      if (event.target === $("detailsModal")) {
        closeDepartureDetails();
      }
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !$("detailsModal").hidden) {
        closeDepartureDetails();
      }
    });

    startRefreshCycle();
    setInterval(startRefreshCycle, CONFIG.refreshMs);
    setInterval(updateRefreshCountdown, 1_000);
  </script>
</body>
</html>
