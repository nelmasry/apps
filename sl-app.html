<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Larsberg → Ropsten</title>

  <style>
    :root {
      --bg: #080b12;
      --panel: #111827;
      --panel-2: #172033;
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #22c55e;
      --yellow: #facc15;
      --red: #fb7185;
      --blue: #38bdf8;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.14), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .board {
      width: min(590px, 100%);
      max-height: calc(100vh - 48px);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 22px;
      flex-shrink: 0;
    }

    .route-label {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .title {
      margin-top: 4px;
      font-size: clamp(28px, 6vw, 42px);
      line-height: 1.05;
      font-weight: 850;
    }

    .status {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      min-width: 110px;
    }

    .live-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      box-shadow: 0 0 14px var(--green);
    }

    .next-card {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.18), rgba(56, 189, 248, 0.12));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .next-label {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .next-main {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }

    .next-time {
      font-size: clamp(54px, 14vw, 96px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.06em;
    }

    .next-line {
      text-align: right;
      font-size: 20px;
      color: var(--text);
      font-weight: 750;
    }

    .next-mode {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .content-scroll {
      overflow-y: auto;
      padding-right: 4px;
    }

    .content-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .content-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.28);
      border-radius: 999px;
    }

    .rows {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 12px;
      align-items: center;
      background: rgba(23, 32, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .line {
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(56, 189, 248, 0.16);
      color: var(--blue);
      font-weight: 900;
      font-size: 18px;
    }

    .destination {
      font-size: 20px;
      font-weight: 760;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .time {
      font-size: 24px;
      font-weight: 850;
      white-space: nowrap;
    }

    .warning {
      display: none;
      margin-top: 16px;
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(250, 204, 21, 0.13);
      border: 1px solid rgba(250, 204, 21, 0.25);
      color: #fde68a;
      font-size: 14px;
      line-height: 1.4;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      flex-shrink: 0;
    }

    .error {
      display: none;
      background: rgba(251, 113, 133, 0.12);
      border: 1px solid rgba(251, 113, 133, 0.28);
      color: #fecdd3;
      padding: 14px 16px;
      border-radius: 18px;
      margin-bottom: 16px;
      line-height: 1.4;
      flex-shrink: 0;
    }

    @media (max-width: 420px) {
      body {
        padding: 12px;
      }

      .board {
        width: 100%;
        max-height: calc(100vh - 24px);
        border-radius: 22px;
        padding: 18px;
      }

      .header {
        flex-direction: column;
        margin-bottom: 16px;
      }

      .status {
        text-align: left;
      }

      .next-card {
        padding: 18px;
      }

      .row {
        grid-template-columns: 48px 1fr auto;
        padding: 12px;
      }

      .destination {
        font-size: 17px;
      }

      .time {
        font-size: 20px;
      }

      .footer {
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
</head>

<body>
  <main class="board">
    <section class="header">
      <div>
        <div class="route-label">Home departure board</div>
        <div class="title">Larsberg → Ropsten</div>
      </div>

      <div class="status">
        <div><span class="live-dot"></span>Live</div>
        <div id="updatedAt">Loading...</div>
      </div>
    </section>

    <div id="error" class="error"></div>

    <section id="nextCard" class="next-card">
      <div class="next-label">Next departure</div>

      <div class="next-main">
        <div id="nextTime" class="next-time">--</div>

        <div>
          <div id="nextLine" class="next-line">--</div>
          <div id="nextMode" class="next-mode">--</div>
        </div>
      </div>
    </section>

    <section class="content-scroll">
      <section id="rows" class="rows"></section>
      <section id="warning" class="warning"></section>
    </section>

    <footer class="footer">
      <span>Data from SL / Trafiklab</span>
      <span>Refreshes every 60s</span>
    </footer>
  </main>

  <script>
    const API_URL = "https://transport.integration.sl.se/v1/sites/9249/departures";

    const CONFIG = {
      destination: "Ropsten",

      // Show all matching departures within the next 1 hour.
      lookAheadMinutes: 60,

      // If a departure is more than 30 minutes away, show the clock time instead.
      showClockTimeAfterMinutes: 30,

      // Use ["TRAM"] for Lidingöbanan only.
      // Use ["TRAM", "BUS"] to show both tram 21 and bus 206.
      transportModes: ["TRAM", "BUS"],

      // Use ["21"] for tram only.
      // Use ["21", "206"] to show both.
      lines: ["21", "206"],

      refreshMs: 60_000
    };

    const $ = (id) => document.getElementById(id);

    function modeIcon(mode) {
      switch (mode) {
        case "TRAM":
          return "🚋";
        case "BUS":
          return "🚌";
        case "METRO":
          return "🚇";
        case "TRAIN":
          return "🚆";
        case "SHIP":
          return "⛴️";
        default:
          return "➡️";
      }
    }

    function formatMode(mode) {
      switch (mode) {
        case "TRAM":
          return "Tram / Lidingöbanan";
        case "BUS":
          return "Bus";
        case "METRO":
          return "Metro";
        case "TRAIN":
          return "Train";
        case "SHIP":
          return "Ferry";
        default:
          return mode || "Transport";
      }
    }

    function minutesUntil(dateString) {
      const expected = new Date(dateString);
      const now = new Date();

      return Math.round((expected.getTime() - now.getTime()) / 60_000);
    }

    function formatClockTime(dateString) {
      const date = new Date(dateString);

      return date.toLocaleTimeString("en-GB", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function translateDisplay(value) {
      if (!value) return "--";

      if (value.toLowerCase() === "nu") {
        return "Now";
      }

      return value;
    }

    function formatDepartureTime(departure) {
      const mins = minutesUntil(departure.expected);

      if (mins <= 0) {
        return "Now";
      }

      if (mins > CONFIG.showClockTimeAfterMinutes) {
        return formatClockTime(departure.expected);
      }

      return `${mins} min`;
    }

    function translateAlertMessage(message) {
      if (!message) return "";

      const knownTranslations = [
        {
          sv: "Bussar ersätter spårvagnarna mellan Käppala och Gåshaga brygga på vardagar under rusningstid pga underhållsarbete på spårvagnarna. Läs mer på sl.se.",
          en: "Buses replace trams between Käppala and Gåshaga brygga on weekdays during rush hour due to maintenance work on the trams. Read more at sl.se."
        }
      ];

      const match = knownTranslations.find(item => item.sv === message);

      if (match) {
        return match.en;
      }

      return message;
    }

    function normalizeDeparture(d) {
      return {
        destination: d.destination,
        display: d.display,
        expected: d.expected,
        scheduled: d.scheduled,
        state: d.state,
        line: d.line?.designation,
        mode: d.line?.transport_mode,
        groupOfLines: d.line?.group_of_lines,
        stopArea: d.stop_area?.name,
        stopPoint: d.stop_point?.designation,
        deviations: d.deviations || []
      };
    }

    function filterDepartures(departures) {
      return departures
        .map(normalizeDeparture)
        .filter(d => d.destination?.toLowerCase() === CONFIG.destination.toLowerCase())
        .filter(d => CONFIG.transportModes.includes(d.mode))
        .filter(d => CONFIG.lines.includes(d.line))
        .filter(d => {
          const mins = minutesUntil(d.expected);
          return mins >= 0 && mins <= CONFIG.lookAheadMinutes;
        })
        .sort((a, b) => new Date(a.expected) - new Date(b.expected));
    }

    function renderDepartures(items) {
      const rows = $("rows");
      rows.innerHTML = "";

      if (items.length === 0) {
        $("nextTime").textContent = "--";
        $("nextLine").textContent = "No departures";
        $("nextMode").textContent = "Try refreshing";

        rows.innerHTML = `
          <div class="row">
            <div class="line">?</div>
            <div>
              <div class="destination">No matching departures</div>
              <div class="meta">Destination: ${CONFIG.destination}</div>
            </div>
            <div class="time">--</div>
          </div>
        `;

        return;
      }

      const next = items[0];

      $("nextTime").textContent = formatDepartureTime(next);
      $("nextLine").textContent = `${modeIcon(next.mode)} ${next.line} ${next.destination}`;
      $("nextMode").textContent = formatMode(next.mode);

      for (const item of items) {
        const row = document.createElement("div");
        row.className = "row";

        row.innerHTML = `
          <div class="line">${item.line}</div>
          <div>
            <div class="destination">${modeIcon(item.mode)} ${item.destination}</div>
            <div class="meta">
              ${formatMode(item.mode)}
              ${item.stopPoint ? " · Platform " + item.stopPoint : ""}
            </div>
          </div>
          <div class="time">${formatDepartureTime(item)}</div>
        `;

        rows.appendChild(row);
      }
    }

    function renderWarning(stopDeviations) {
      const warning = $("warning");

      if (!Array.isArray(stopDeviations) || stopDeviations.length === 0) {
        warning.style.display = "none";
        warning.textContent = "";
        return;
      }

      const firstMessage = stopDeviations[0]?.message;

      if (!firstMessage) {
        warning.style.display = "none";
        warning.textContent = "";
        return;
      }

      warning.style.display = "block";
      warning.textContent = "⚠️ " + translateAlertMessage(firstMessage);
    }

    function setUpdatedNow() {
      const now = new Date();

      $("updatedAt").textContent = now.toLocaleTimeString("en-GB", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showError(message) {
      const error = $("error");
      error.style.display = "block";
      error.textContent = message;
    }

    function clearError() {
      const error = $("error");
      error.style.display = "none";
      error.textContent = "";
    }

    async function loadDepartures() {
      try {
        clearError();

        const response = await fetch(API_URL, {
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error(`SL API failed: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();

        const filtered = filterDepartures(data.departures || []);

        renderDepartures(filtered);
        renderWarning(data.stop_deviations || []);
        setUpdatedNow();
      } catch (error) {
        console.error(error);

        showError(
          "Could not load departures. If this works in Postman but not in the browser, it may be a CORS issue. Then we need a tiny backend/proxy."
        );
      }
    }

    loadDepartures();
    setInterval(loadDepartures, CONFIG.refreshMs);
  </script>
</body>
</html>
